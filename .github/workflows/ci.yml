name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          profile: minimal
          override: true

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy checks
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Install Binaryen
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Optimize campaign WASM
        run: |
          cargo build --release --target wasm32-unknown-unknown
          bash scripts/wasm/optimize-wasm.sh campaign

      - name: Optimize factory WASM
        run: |
          cargo build --release --target wasm32-unknown-unknown
          bash scripts/wasm/optimize-wasm.sh factory

      - name: Upload WASM size report
        uses: actions/upload-artifact@v4
        with:
          name: wasm-size-report
          path: target/wasm-size-report.txt

      - name: Enforce WASM size budget
        run: |
          set -e
          for file in target/wasm32-unknown-unknown/release/*.opt.wasm; do
            size=$(wc -c < "$file")
            echo "$file: $size bytes"
            if [ "$size" -gt 102400 ]; then
              echo "ERROR: $file exceeds 100KB size budget ($size bytes)"
              exit 1
            fi
          done